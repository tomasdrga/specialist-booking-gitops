apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wac-hospital

labels:
  - pairs:
      app.kubernetes.io/part-of: wac-hospital

resources:
  - ../../../apps/specialist-booking-ufe
  - ../../../apps/specialist-booking-webapi
  - ../../../apps/mongo-express

patches:
  - path: patches/specialist-booking-webapi.service.yaml
  - path: patches/mongodb-auth.secret.yaml

components:
  - ../../../components/version-developers
  - https://github.com/tomasdrga/specialist-booking-webapi//deployments/kustomize/components/mongodb
