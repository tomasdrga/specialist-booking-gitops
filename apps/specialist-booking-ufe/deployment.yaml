apiVersion: apps/v1
kind: Deployment
metadata:
  name: specialist-booking-ufe-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: specialist-booking-ufe-label
  template:
    metadata:
      labels:
        pod: specialist-booking-ufe-label
    spec:
      containers:
        - name: specialist-booking-ufe-container
          image: tomdrg/specialist-booking-ufe
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "32M"
              cpu: "0.1"
            limits:
              memory: "320M"
              cpu: "0.3"
